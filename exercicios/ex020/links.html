<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>

        /*  SELETORES PERSONALIZADOS

            # = id
            . = class
            : = pseudo-class
            :: = pseudo-element
            > = children
            
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none; /*Tirando os sublinhado de todos os links*/
            font-weight: bold; 
        }

        /*visisted quando o site ja foi visitado*/
        a:visited {
            color: darkred;
        }


        /*Hover quando passa o mouse por cima*/
        a:hover {
            color: black;
            text-decoration: underline; /*Sublinhando o link*/
        }

        /*active é quando clica no link*/
        a:active { 
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank"> Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/"> Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com"> Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
