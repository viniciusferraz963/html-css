<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture> <!--Px sempre de forma crescente, de cima pra baixo.-->
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">

        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        
        <img src="Imagens/foto-g.png" alt="Imagem flexivel">
    </picture>
    
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio src="midia/holynight.mp3" controls loop></audio>

    <p>Segunda forma de se fazer</p>
    <audio controls>
        <source src="midia/holynight.mp3" type="audio/mpeg">
        <source src="midia/holynight.ogg" type="audio/ogg"> <!--Precisa converter o audio pra ogg-->
        <source src="midia/holynight.wav" type="audio/wav"> <!--Precisa converter o audio pra wav, tentar não usar, muito-->

        <p>Caso seu navegar não possibilitar a abertura do áudio <a href="midia/holynight.mp3">Clique aqui para baixar o arquivo MP3.</a></p>
    </audio>
    
</body>
</html>
