<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p><strong>Este video está hospedado no meu próprio servidor, Forma Secundaria.</strong></p>

    <video src="midia/meu-video.mp4" width="300" height="300" controls></video> <!--Forma secundaria-->
    <p><strong>Este video está hospedado no meu  próprio servidor, Forma Primaria.</strong></p>
    
    <video width="300" height="300" controls>
            <source src="midia/meu-video.mp4" type="video/mp4">
            <source src="midia/meu-video.m4v" width="300" height="300" type="video/m4v">
            <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>
        </video> <!--Incorporação de videos internos (Consumo de Banda muito grande)-->

        <h1>Inserindo videos do youtube</h1>
        <iframe width="300" height="300" src="https://www.youtube.com/embed/IGTJyeSGrzI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <!--Código criado com youtube-->
        
    </body>
</html>
